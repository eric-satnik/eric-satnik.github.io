<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bingo Bango!</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg: #0b0f0a;
        --fg: #33ff66;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
        font-family: "SF Mono", Menlo, Consolas, "Courier New", monospace;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .terminal {
        width: min(900px, 100%);
        height: min(640px, 90vh);
        min-height: 420px;
        background: var(--bg);
        border-radius: 10px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px #222 inset;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      /* Mobile / narrow screens: shrink padding and let ASCII art scroll
         horizontally inside the terminal instead of overflowing the page. */
      @media (max-width: 700px) {
        body { padding: 8px; }
        .terminal {
          height: 100vh;
          height: 100dvh;
          min-height: 0;
          border-radius: 0;
        }
        .screen { font-size: 11px; padding: 10px 12px; }
        .title { font-size: 11px; }
      }
      .titlebar {
        background: linear-gradient(#2b2b2b, #1c1c1c);
        height: 30px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        gap: 8px;
        border-bottom: 1px solid #000;
      }
      .dot { width: 12px; height: 12px; border-radius: 50%; }
      .dot.red { background: #ff5f56; }
      .dot.yellow { background: #ffbd2e; }
      .dot.green { background: #27c93f; }
      .title {
        color: #aaa;
        font-size: 12px;
        margin-left: auto;
        margin-right: auto;
        transform: translateX(-30px);
      }
      .screen {
        flex: 1;
        padding: 16px 18px;
        color: var(--fg);
        font-size: 14px;
        line-height: 1.2;
        overflow: auto;
        text-shadow: 0 0 6px rgba(51,255,102,0.35);
      }
      .line {
        white-space: pre;
        font-family: inherit;
      }
      .prompt-user { color: #7CFC00; }
      .prompt-host { color: #6cf; }
      .prompt-path { color: #fc6; }
      .cursor {
        display: inline-block;
        width: 9px;
        height: 1em;
        background: var(--fg);
        vertical-align: -2px;
        margin-left: 2px;
        animation: blink 1s steps(1) infinite;
        box-shadow: 0 0 8px rgba(51,255,102,0.7);
      }
      @keyframes blink { 50% { opacity: 0; } }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-thumb { background: #143014; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const PROMPT = (
        <>
          <span className="prompt-user">guest</span>
          <span>@</span>
          <span className="prompt-host">terminal</span>
          <span>:</span>
          <span className="prompt-path">~</span>
          <span>$ </span>
        </>
      );

      // ASCII art (figlet "Standard" font)
      const ASCII_ROBOTS = [
        "     _           _     ____        _ _     _   ____        _           _       _ ",
        "    | |_   _ ___| |_  | __ ) _   _(_) | __| | |  _ \\ ___ | |__   ___ | |_ ___| |",
        " _  | | | | / __| __| |  _ \\| | | | | |/ _` | | |_) / _ \\| '_ \\ / _ \\| __/ __| |",
        "| |_| | |_| \\__ \\ |_  | |_) | |_| | | | (_| | |  _ < (_) | |_) | (_) | |_\\__ \\_|",
        " \\___/ \\__,_|___/\\__| |____/ \\__,_|_|_|\\__,_| |_| \\_\\___/|_.__/ \\___/ \\__|___(_)",
        "                                                                                ",
      ];

      const ASCII_BINGO = [
        " ____  _                         ____                          _ ",
        "| __ )(_)_ __   __ _  ___       | __ )  __ _ _ __   __ _  ___ | |",
        "|  _ \\| | '_ \\ / _` |/ _ \\      |  _ \\ / _` | '_ \\ / _` |/ _ \\| |",
        "| |_) | | | | | (_| | (_) |     | |_) | (_| | | | | (_| | (_) |_|",
        "|____/|_|_| |_|\\__, |\\___/      |____/ \\__,_|_| |_|\\__, |\\___(_)",
        "               |___/                                |___/        ",
      ];

      // Script: type a command, then "print" the ASCII art line by line.
      const SCRIPT = [
        { type: "cmd", text: "figlet 'Just Build Robots!'" },
        ...ASCII_ROBOTS.map((text) => ({ type: "out", text })),
        { type: "out", text: "" },
        { type: "prompt" },
        { type: "prompt" },
        { type: "prompt" },
        { type: "cmd", text: "figlet 'Bingo Bango!'" },
        ...ASCII_BINGO.map((text) => ({ type: "out", text })),
        { type: "out", text: "" },
      ];

      const TYPE_SPEED = 50;
      const LINE_DELAY = 400;
      const OUTPUT_DELAY = 90;

      function Terminal() {
        const [lines, setLines] = useState([]);
        const [typing, setTyping] = useState("");
        const [done, setDone] = useState(false);
        const screenRef = useRef(null);

        useEffect(() => {
          const el = screenRef.current;
          if (el) el.scrollTop = el.scrollHeight;
        }, [lines, typing]);

        useEffect(() => {
          let cancelled = false;
          const timeouts = [];
          const wait = (ms) =>
            new Promise((res) => {
              const t = setTimeout(res, ms);
              timeouts.push(t);
            });

          async function run() {
            for (let i = 0; i < SCRIPT.length; i++) {
              if (cancelled) return;
              const item = SCRIPT[i];
              if (item.type === "cmd") {
                setTyping("");
                await wait(LINE_DELAY);
                for (let c = 1; c <= item.text.length; c++) {
                  if (cancelled) return;
                  setTyping(item.text.slice(0, c));
                  await wait(TYPE_SPEED + Math.random() * 40);
                }
                await wait(300);
                setLines((prev) => [...prev, { kind: "cmd", text: item.text }]);
                setTyping("");
              } else if (item.type === "prompt") {
                await wait(LINE_DELAY);
                setLines((prev) => [...prev, { kind: "cmd", text: "" }]);
              } else {
                await wait(OUTPUT_DELAY);
                setLines((prev) => [...prev, { kind: "out", text: item.text }]);
              }
            }
            if (!cancelled) setDone(true);
          }
          run();
          return () => {
            cancelled = true;
            timeouts.forEach(clearTimeout);
          };
        }, []);

        return (
          <div className="terminal">
            <div className="titlebar">
              <span className="dot red"></span>
              <span className="dot yellow"></span>
              <span className="dot green"></span>
              <span className="title">guest@terminal: ~</span>
            </div>
            <div className="screen" ref={screenRef}>
              {lines.map((l, idx) =>
                l.kind === "cmd" ? (
                  <div className="line" key={idx}>{PROMPT}{l.text}</div>
                ) : (
                  <div className="line" key={idx}>{l.text}</div>
                )
              )}
              {typing !== "" ? (
                <div className="line">{PROMPT}{typing}<span className="cursor" /></div>
              ) : (
                <div className="line">{PROMPT}<span className="cursor" /></div>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<Terminal />);
    </script>
  </body>
</html>
